<!DOCTYPE html>
<html lang="en">


<!-----------------   Header HTML  ----------------->
<head>

    <!--El Head es leido por el navegador y los robots de busqueda-->
    <!--Reconocer Distribucion de Teclado-->
    <meta charset="UTF-8">

    <!--Compatibilidad Con Edge, Navegador Microsoft-->
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <!--Responsive Por Defecto-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Establecer Autor Web-->
    <meta name="autor" content="RafxDev">

    <!--Establecer Descripcion Contenido Pagina-->
    <meta name="description" content="Web Aprender Metadatos">

    <!--Fijar Palabras Clave Web-->
    <meta name="keywords" content="metadatos, aprender, curso">

    <!--Recargar Pagina Y Redireccionar A X Sitio Web-->
    <meta http-equiv="refresh" content="5; http://www.instagram.com">

    <!--Crear Una Cookie, Mas Uso Con JavaScript-->
    <meta http-equiv="cookie" content="user=rafa; expires=">

    <!--Conectar Hoja CSS-->
    <link rel="stylesheet" href="style.css">

    <!--Establecer Icono A La Web-->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <!--Establecer Nombre Pestana-->
    <title>HTML Header</title>
</head>


<body>
    

    <!--Conectar Hoja JavaScript-->
    <script src="script.js"></script>
</body>
</html>
