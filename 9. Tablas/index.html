<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title>

    <!--Darle estilo Y diseno a la tabla-->
    <style>
        table{
            border-collapse: collapse;
            border: 2px solid rgb(200, 200, 200);
            letter-spacing: 1px;
            font-size: 0.8rem;
        }
        td{
            border: 1px solid rgb(190, 190, 190);
            padding: 10px 20px;
        }
        th{
            border: 1px solid rgb(190, 190, 190);
            padding: 10px 20px;
            background-color: rgb(218, 218, 218);
        }
    </style>
</head>


<body>
    
    <h1>Tabla De Alumnos</h1>
    <hr>

    <table>

        <colgroup>
            <col style="background-color: rgb(218, 218, 218);">
            <col>
            <col>
            <col>
            <col>
        </colgroup>

        <tr>
            <th>&nbsp;</th><!--Poner Vacio-->
            <th>Paula</th>
            <th>Andres</th>
            <th>Mateo</th>
            <th>Maria</th>
        </tr>
        <tr>
            <td>EDAD</td>
            <td>18</td>
            <td>25</td>
            <td>21</td>
            <td>32</td>
        </tr>
        <tr>
            <td>MATERIA</td>
            <td>HTML</td>
            <td>Java</td>
            <td>Python</td>
            <td>Javascript</td>
        </tr>
        <tr>
            <td>NOTA</td>
            <td>5.0</td>
            <td>4.0</td>
            <td>3.2</td>
            <td>3.8</td>
        </tr>
        <tr>
            <td>APROVADO</td>
            <td>Si</td>
            <td>Si</td>
            <td>No</td>
            <td>Si</td>
        </tr>
        <tr>
            <td>AÑOS CURSADOS</td>
            <td>10</td>
            <td>8</td>
            <td>12</td>
            <td>3</td>
        </tr>
    </table>

</body>
</html>
